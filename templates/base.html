<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cyber Forensics Investigation Platform - Real-time parsing, analysis, and forensics.">
    <title>Cyber Forensics Investigation Platform</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Outfit & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- FontAwesome for Cyber Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Chart.js for Data Visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- html2pdf for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Custom Cyber Theme CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <!-- Background grid effect -->
    <div class="cyber-grid"></div>
    <div class="cyber-scanline"></div>

    <!-- Main Navigation / Header -->
    <nav class="navbar navbar-expand-lg navbar-dark cyber-navbar sticky-top" id="mainNavbar">
        <div class="container-fluid px-3 px-lg-4" style="max-width: var(--content-max-width);">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('home') }}" id="nav-brand">
                <i class="fa-solid fa-shield-halved text-cyber-primary me-2 brand-icon"></i>
                <span class="brand-text">CYBER<span class="text-cyber-accent">FORENSICS</span></span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#cyberNavbar" aria-controls="cyberNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="cyberNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{{ url_for('home') }}" id="nav-home">
                            <i class="fa-solid fa-gauge me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/demo1' %}active{% endif %}" href="{{ url_for('demo1') }}" id="nav-demo1">
                            <i class="fa-solid fa-envelope-open-text me-1"></i> Email Forensics
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/demo2' %}active{% endif %}" href="{{ url_for('demo2') }}" id="nav-demo2">
                            <i class="fa-solid fa-file-image me-1"></i> Image Forensics
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/demo3' %}active{% endif %}" href="{{ url_for('demo3') }}" id="nav-demo3">
                            <i class="fa-solid fa-network-wired me-1"></i> Network Forensics
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/about' %}active{% endif %}" href="{{ url_for('about') }}" id="nav-about">
                            <i class="fa-solid fa-circle-info me-1"></i> About
                        </a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                        <div class="d-flex align-items-center system-status-pill px-2 px-md-3 py-1">
                            <span class="status-indicator online"></span>
                            <span class="status-text ms-2 text-uppercase">System Secure</span>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main id="main-content" class="container-fluid px-3 px-lg-4 py-4 py-lg-5 content-wrapper">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="cyber-footer text-center mt-auto">
        <div class="container-fluid px-3 px-lg-4" style="max-width: var(--content-max-width);">
            <p class="mb-0 font-monospace">&copy; 2026 Cyber Forensics Platform &mdash; Secure Session &mdash; Encrypted Connection</p>
        </div>
    </footer>

    <!-- Toast notification container -->
    <div id="cyberToastContainer" class="cyber-toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Main JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <!-- Mobile-First Responsive Module -->
    <script src="{{ url_for('static', filename='js/mobile.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
